services:
  - type: web
    name: dqi-analytics
    runtime: docker
    plan: free
    region: frankfurt
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: QWEN_BASE_URL
        sync: false
      - key: QWEN_API_KEY
        sync: false
      - key: QWEN_MODEL
        value: qwen3.6-flash
